<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الاتصال - العميل</title>
    </head>
<body>
    <button id="startBtn">بدء الاتصال</button>
    <audio id="audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // أدخل إعدادات Firebase الخاصة بك هنا
        const db = getDatabase(initializeApp({ /* ... config ... */ }));
        
        const pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        });

        document.getElementById('startBtn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            
            const callRef = push(ref(db, "calls"));
            window.callId = callRef.key;
            await set(callRef, { status: "waiting" });

            // إرسال الـ ICE
            pc.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${window.callId}/clientIce`), e.candidate.toJSON()); };
            pc.ontrack = e => document.getElementById('audio').srcObject = e.streams[0];

            // الاستماع للـ Offer
            onValue(ref(db, `calls/${window.callId}`), async (snap) => {
                const data = snap.val();
                if(data?.status === "active" && !pc.remoteDescription) {
                    await pc.setRemoteDescription(data.offer);
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    update(ref(db, `calls/${window.callId}`), { answer: ans });
                }
            });

            // استلام الـ ICE من المشغل
            onValue(ref(db, `calls/${window.callId}/opIce`), snap => {
                snap.forEach(c => pc.addIceCandidate(c.val()));
            });
        };
    </script>
</body>
</html>
