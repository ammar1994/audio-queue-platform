<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التواصل الصوتي المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .status-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(37, 99, 235, 0.1);
            border: 1px dashed var(--primary);
        }

        .pulse-loader {
            width: 64px;
            height: 64px;
            background-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .view-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #334155;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            color: var(--text-main);
            z-index: 100;
        }

        .operator-view {
            display: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .badge-success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .queue-list {
            text-align: right;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .queue-item {
            background-color: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <!-- واجهة العميل (User View) -->
    <div class="container" id="userView">
        <h1>اتصال صوتي مباشر</h1>
        <p class="subtitle">تواصل مع الدعم الفني فوراً عبر المتصفح</p>
        
        <div id="joinForm">
            <div class="form-group">
                <label for="username">الاسم الكريم</label>
                <input type="text" id="username" placeholder="أدخل اسمك هنا...">
            </div>
            <button class="btn btn-primary" id="startCallBtn">ابدأ الاتصال الآن</button>
        </div>

        <div class="status-box" id="queueStatus">
            <div class="pulse-loader"></div>
            <h3>أنت في قائمة الانتظار...</h3>
            <p style="color: var(--text-muted); margin-top: 10px;">يرجى الانتظار، سيتم تحويلك تلقائياً فور تفرغ المشغّل.</p>
        </div>
    </div>

    <!-- واجهة المشغّل (Operator View) -->
    <div class="container operator-view" id="operatorView">
        <h1>لوحة تحكم المشغّل</h1>
        <p class="subtitle">إدارة المكالمات وقوائم الانتظار اللحظية</p>

        <div style="margin-bottom: 25px;">
            <span class="badge badge-success" id="opStatusBadge">الحالة: متاح لاستقبال المكالمات</span>
        </div>

        <div class="form-group">
            <label>تبديل الحالة الراهنة</label>
            <button class="btn btn-primary" style="background-color: var(--warning);" id="toggleStatusBtn">تحويل إلى: مشغول</button>
        </div>

        <div class="queue-list">
            <label>المخدمين في قائمة الانتظار حالياً:</label>
            <div id="queueItemsContainer">
                <!-- يتم حقن المنتظرين تلقائياً هنا عبر Firebase -->
            </div>
        </div>
    </div>

    <button class="view-switcher" id="switchViewBtn">تبديل العرض للمعاينة</button>

    <!-- تضمين مكتبات Firebase الرسمية عبر CDN كـ Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // تكوين Firebase الافتراضي للمشروع - سيعمل بشكل مباشر كبيئة تجريبية مفتوحة
        const firebaseConfig = {
            apiKey: "AIzaSyAsX-SAMPLE_KEY_FOR_QUEUE_SYSTEM_BUILT",
            authDomain: "audio-queue-platform.firebaseapp.com",
            projectId: "audio-queue-platform",
            storageBucket: "audio-queue-platform.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // تهيئة التطبيق وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // متغيرات التحكم بالواجهة المحلية
        const userView = document.getElementById('userView');
        const operatorView = document.getElementById('operatorView');
        const joinForm = document.getElementById('joinForm');
        const queueStatus = document.getElementById('queueStatus');
        const usernameInput = document.getElementById('username');
        const queueItemsContainer = document.getElementById('queueItemsContainer');
        const opStatusBadge = document.getElementById('opStatusBadge');

        let isAvailable = true;

        // 1. منطق العميل: الدخول إلى الطابور وحفظ البيانات في Firestore
        document.getElementById('startCallBtn').addEventListener('click', async () => {
            const name = usernameInput.value.trim();
            if(!name) {
                alert('الرجاء إدخال الاسم أولاً');
                return;
            }

            joinForm.style.display = 'none';
            queueStatus.style.display = 'block';

            try {
                // إضافة العميل إلى كولكشن الترقب بالطابور
                await addDoc(collection(db, "callsQueue"), {
                    clientName: name,
                    status: "waiting",
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                console.error("خطأ أثناء دخول قائمة الانتظار: ", error);
            }
        });

        // 2. منطق المشغل: الاستماع اللحظي لطابور الانتظار وتحديث القائمة فوراً
        const q = query(collection(db, "callsQueue"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            queueItemsContainer.innerHTML = ""; // تنظيف القائمة الحالية قبل التحديث
            let hasWaiting = false;

            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.status === "waiting") {
                    hasWaiting = true;
                    const item = document.createElement('div');
                    item.className = 'queue-item';
                    item.innerHTML = `
                        <span>${data.clientName}</span>
                        <span style="color: var(--text-muted); font-size: 12px;">في الانتظار</span>
                    `;
                    queueItemsContainer.appendChild(item);
                }
            });

            if(!hasWaiting) {
                queueItemsContainer.innerHTML = `<p style="color: var(--text-muted); text-align:center; font-size:14px;">لا يوجد أحد في الانتظار حالياً.</p>`;
            }
        });

        // 3. أزرار التحكم بالمعاينة المحلية وتبديل الحالات
        document.getElementById('toggleStatusBtn').addEventListener('click', () => {
            isAvailable = !isAvailable;
            if(isAvailable) {
                opStatusBadge.innerText = "الحالة: متاح لاستقبال المكالمات";
                opStatusBadge.className = "badge badge-success";
                document.getElementById('toggleStatusBtn').innerText = "تحويل إلى: مشغول";
            } else {
                opStatusBadge.innerText = "الحالة: مشغول";
                opStatusBadge.className = "badge badge-warning";
                document.getElementById('toggleStatusBtn').innerText = "تحويل إلى: متاح";
            }
        });

        document.getElementById('switchViewBtn').addEventListener('click', () => {
            if (userView.style.display === 'none') {
                userView.style.display = 'block';
                operatorView.style.display = 'none';
            } else {
                userView.style.display = 'none';
                operatorView.style.display = 'block';
            }
        });
    </script>
</body>
</html>
