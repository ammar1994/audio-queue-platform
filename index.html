<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التواصل الصوتي المباشر</title>
    <!-- خط رائع ومناسب للتصاميم الفاخرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* شاشات الحالات اللاحقة */
        .status-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(37, 99, 235, 0.1);
            border: 1px dashed var(--primary);
        }

        .pulse-loader {
            width: 64px;
            height: 64px;
            background-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .view-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #334155;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            color: var(--text-main);
        }

        /* ستايل لوحة التحكم للمشغل */
        .operator-view {
            display: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .badge-success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .queue-list {
            text-align: right;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .queue-item {
            background-color: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <!-- واجهة العميل (User View) -->
    <div class="container" id="userView">
        <h1>اتصال صوتی مباشر</h1>
        <p class="subtitle">تواصل مع الدعم الفني فوراً عبر المتصفح</p>
        
        <div id="joinForm">
            <div class="form-group">
                <label for="username">الاسم الكريم</label>
                <input type="text" id="username" placeholder="أدخل اسمك هنا...">
            </div>
            <button class="btn btn-primary" onclick="enterQueue()">ابدأ الاتصال الآن</button>
        </div>

        <!-- صندوق الانتظار -->
        <div class="status-box" id="queueStatus">
            <div class="pulse-loader"></div>
            <h3>أنت في قائمة الانتظار...</h3>
            <p style="color: var(--text-muted); margin-top: 10px;">يرجى الانتظار، سيتم تحويلك تلقائياً فور تفرغ المشغّل.</p>
        </div>
    </div>

    <!-- واجهة المشغّل (Operator View) -->
    <div class="container operator-view" id="operatorView">
        <h1>لوحة تحكم المشغّل</h1>
        <p class="subtitle">إدارة المكالمات وقوائم الانتظار اللحظية</p>

        <div style="margin-bottom: 25px;">
            <span class="badge badge-success" id="opStatusBadge">الحالة: متاح لاستقبال المكالمات</span>
        </div>

        <div class="form-group">
            <label>تبديل الحالة الراهنة</label>
            <button class="btn btn-primary" style="background-color: var(--warning);" onclick="toggleOperatorStatus()">تحويل إلى: مشغول</button>
        </div>

        <div class="queue-list">
            <label>المستخدمين في قائمة الانتظار حالياً:</label>
            <div id="queueItemsContainer">
                <div class="queue-item">
                    <span>أحمد محمد</span>
                    <span style="color: var(--text-muted); font-size: 12px;">في الانتظار منذ دقيقة</span>
                </div>
                <div class="queue-item">
                    <span>خالد العلي</span>
                    <span style="color: var(--text-muted); font-size: 12px;">في الانتظار منذ ثوانٍ</span>
                </div>
            </div>
        </div>
    </div>

    <!-- زر سفلي وهمي للتبديل بين الواجهتين للتجربة والمعاينة حالياً -->
    <button class="view-switcher" onclick="switchView()">تبديل العرض (معاينة الموظف / العميل)</button>

    <script>
        // دالة بسيطة للتبديل اللحظي بين الواجهات للمعاينة البصرية
        function switchView() {
            const userView = document.getElementById('userView');
            const operatorView = document.getElementById('operatorView');
            if (userView.style.display === 'none') {
                userView.style.display = 'block';
                operatorView.style.display = 'none';
            } else {
                userView.style.display = 'none';
                operatorView.style.display = 'block';
            }
        }

        // محاكاة الدخول في الطابور للعميل
        function enterQueue() {
            const name = document.getElementById('username').value;
            if(!name) {
                alert('الرجاء إدخال الاسم أولاً');
                return;
            }
            document.getElementById('joinForm').style.display = 'none';
            document.getElementById('queueStatus').style.display = 'block';
        }

        // محاكاة تغيير حالة الموظف
        let isAvailable = true;
        function toggleOperatorStatus() {
            const badge = document.getElementById('opStatusBadge');
            isAvailable = !isAvailable;
            if(isAvailable) {
                badge.innerText = "الحالة: متاح لاستقبال المكالمات";
                badge.className = "badge badge-success";
            } else {
                badge.innerText = "الحالة: مشغول";
                badge.className = "badge badge-warning";
            }
        }
    </script>
</body>
</html>
