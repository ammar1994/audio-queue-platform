<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التواصل الصوتي المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 5px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            margin-top: 15px;
        }

        .status-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(37, 99, 235, 0.1);
            border: 1px dashed var(--primary);
        }

        .pulse-loader {
            width: 64px;
            height: 64px;
            background-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .view-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #334155;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            color: var(--text-main);
            z-index: 100;
        }

        .operator-view {
            display: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .badge-success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .queue-list {
            text-align: right;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .queue-item {
            background-color: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        /* عناصر الصوت المخفية */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <!-- عناصر الصوت المطلوبة لاستقبال البث الصوتي الفعلي -->
    <audio id="remoteAudio" autoplay controls></audio>

    <!-- واجهة العميل (User View) -->
    <div class="container" id="userView">
        <h1>اتصال صوتي مباشر</h1>
        <p class="subtitle">تواصل مع الدعم الفني فوراً عبر المتصفح</p>
        
        <div id="joinForm">
            <div class="form-group">
                <label for="username">الاسم الكريم</label>
                <input type="text" id="username" placeholder="أدخل اسمك هنا...">
            </div>
            <button class="btn btn-primary" id="startCallBtn">ابدأ الاتصال الآن</button>
        </div>

        <div class="status-box" id="queueStatus">
            <div class="pulse-loader"></div>
            <h3 id="queueText">أنت في قائمة الانتظار...</h3>
            <p style="color: var(--text-muted); margin-top: 10px;" id="queueSubtext">يرجى الانتظار، سيتم تحويلك تلقائياً فور تفرغ المشغّل.</p>
            <button class="btn btn-danger" id="endCallClientBtn" style="display: none;">إنهاء المكالمة</button>
        </div>
    </div>

    <!-- واجهة المشغّل (Operator View) -->
    <div class="container operator-view" id="operatorView">
        <h1>لوحة تحكم المشغّل</h1>
        <p class="subtitle">إدارة المكالمات وقوائم الانتظار اللحظية</p>

        <div style="margin-bottom: 25px;">
            <span class="badge badge-success" id="opStatusBadge">الحالة: متاح لاستقبال المكالمات</span>
        </div>

        <div class="form-group">
            <label>تبديل الحالة الراهنة</label>
            <button class="btn btn-primary" style="background-color: var(--warning);" id="toggleStatusBtn">تحويل إلى: مشغول</button>
        </div>

        <div class="queue-list">
            <label>المستخدمين في قائمة الانتظار حالياً:</label>
            <div id="queueItemsContainer">
                <!-- يتم حقن المنتظرين تلقائياً هنا عبر Firebase -->
            </div>
        </div>

        <!-- نافذة المكالمة الحالية للمشغل -->
        <div class="status-box" id="activeCallBox" style="border-color: var(--success); background-color: rgba(16, 185, 129, 0.1);">
            <h3 style="color: var(--success);">مكالمة جارية الآن...</h3>
            <p id="activeClientName" style="margin-top: 5px; font-weight: 600;"></p>
            <button class="btn btn-danger" id="endCallOpBtn">إنهاء المكالمة الحالية</button>
        </div>
    </div>

    <button class="view-switcher" id="switchViewBtn">تبديل العرض للمعاينة</button>

    <!-- تضمين مكتبات Firebase الرسمية عبر CDN كـ Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsX-SAMPLE_KEY_FOR_QUEUE_SYSTEM_BUILT",
            authDomain: "audio-queue-platform.firebaseapp.com",
            projectId: "audio-queue-platform",
            storageBucket: "audio-queue-platform.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // خوادم الـ STUN المجانية من جوجل لتسهيل اتصالات WebRTC وتجاوز الـ NAT
        const rtcConfig = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        let localStream = null;
        let peerConnection = null;
        let currentCallDocId = null;
        let isAvailable = true;

        const userView = document.getElementById('userView');
        const operatorView = document.getElementById('operatorView');
        const joinForm = document.getElementById('joinForm');
        const queueStatus = document.getElementById('queueStatus');
        const queueText = document.getElementById('queueText');
        const queueSubtext = document.getElementById('queueSubtext');
        const usernameInput = document.getElementById('username');
        const queueItemsContainer = document.getElementById('queueItemsContainer');
        const opStatusBadge = document.getElementById('opStatusBadge');
        const activeCallBox = document.getElementById('activeCallBox');
        const activeClientName = document.getElementById('activeClientName');
        const remoteAudio = document.getElementById('remoteAudio');

        // تهيئة اتصال الـ WebRTC وتجهيز الميكروفون
        async function setupWebRTC() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.ontrack = (event) => {
                remoteAudio.srcObject = event.streams[0];
            };
        }

        // منطق العميل: طلب مكالمة والدخول بالطابور
        document.getElementById('startCallBtn').addEventListener('click', async () => {
            const name = usernameInput.value.trim();
            if(!name) {
                alert('الرجاء إدخال الاسم أولاً');
                return;
            }

            try {
                await setupWebRTC();
                joinForm.style.display = 'none';
                queueStatus.style.display = 'block';

                const callDocRef = await addDoc(collection(db, "callsQueue"), {
                    clientName: name,
                    status: "waiting",
                    createdAt: serverTimestamp()
                });
                currentCallDocId = callDocRef.id;

                // الاستماع لتحديثات هذه المكالمة (هل قبلها المشغل؟)
                onSnapshot(doc(db, "callsQueue", currentCallDocId), async (snapshot) => {
                    const data = snapshot.data();
                    if(data && data.status === "active" && data.offer) {
                        queueText.innerText = "أنت في مكالمة مباشرة الآن";
                        queueSubtext.innerText = "جاري التحدث مع الموظف الفني...";
                        document.getElementById('endCallClientBtn').style.display = 'block';

                        if (!peerConnection.currentRemoteDescription) {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                            const answer = await peerConnection.createAnswer();
                            await peerConnection.setLocalDescription(answer);
                            await updateDoc(doc(db, "callsQueue", currentCallDocId), { answer: { type: answer.type, sdp: answer.sdp } });
                        }
                    }
                    if(data && data.status === "ended") {
                        handleCallTermination();
                    }
                });

            } catch (err) {
                alert("يرجى تفعيل صلاحية الميكروفون للتمكن من الاتصال.");
                console.error(err);
            }
        });

        // منطق المشغل: إدارة الطوابير والرد اللحظي على العميل
        const q = query(collection(db, "callsQueue"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            queueItemsContainer.innerHTML = "";
            let hasWaiting = false;

            snapshot.forEach((docSnapshot) => {
                const data = docSnapshot.data();
                if (data.status === "waiting") {
                    hasWaiting = true;
                    const item = document.createElement('div');
                    item.className = 'queue-item';
                    item.innerHTML = `
                        <span>${data.clientName}</span>
                        <button class="btn btn-success" style="width:auto; padding:5px 15px; font-size:12px;" id="answer-${docSnapshot.id}">رد</button>
                    `;
                    queueItemsContainer.appendChild(item);

                    document.getElementById(`answer-${docSnapshot.id}`).addEventListener('click', () => {
                        answerCall(docSnapshot.id, data.clientName);
                    });
                }
            });

            if(!hasWaiting) {
                queueItemsContainer.innerHTML = `<p style="color: var(--text-muted); text-align:center; font-size:14px;">لا يوجد أحد في الانتظار حالياً.</p>`;
            }
        });

        // دالة رد المشغل وإنشاء الـ WebRTC Offer للعميل
        async function answerCall(id, clientName) {
            currentCallDocId = id;
            await setupWebRTC();
            
            // جمع الـ ICE Candidates وإرسالها
            peerConnection.onicecandidate = async (event) => {
                if (event.candidate) {
                    await updateDoc(doc(db, "callsQueue", currentCallDocId), { offerCandidate: event.candidate.toJSON() });
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await updateDoc(doc(db, "callsQueue", currentCallDocId), {
                status: "active",
                offer: { type: offer.type, sdp: offer.sdp }
            });

            activeClientName.innerText = `العميل: ${clientName}`;
            activeCallBox.style.display = "block";

            // الاستماع للـ Answer القادم من العميل لإغلاق الدائرة الصوتية
            onSnapshot(doc(db, "callsQueue", currentCallDocId), (snapshot) => {
                const data = snapshot.data();
                if(data && data.answer && !peerConnection.currentRemoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if(data && data.status === "ended") {
                    handleCallTermination();
                }
            });
        }

        // دالة إنهاء وإغلاق المكالمة وتصفية الـ Streams
        async function terminateCall() {
            if(currentCallDocId) {
                await updateDoc(doc(db, "callsQueue", currentCallDocId), { status: "ended" });
            }
            handleCallTermination();
        }

        function handleCallTermination() {
            if (peerConnection) {
                peerConnection.close();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            activeCallBox.style.display = "none";
            joinForm.style.display = 'block';
            queueStatus.style.display = 'none';
            document.getElementById('endCallClientBtn').style.display = 'none';
            queueText.innerText = "أنت في قائمة الانتظار...";
            queueSubtext.innerText = "يرجى الانتظار، سيتم تحويلك تلقائياً فور تفرغ المشغّل.";
        }

        document.getElementById('endCallOpBtn').addEventListener('click', terminateCall);
        document.getElementById('endCallClientBtn').addEventListener('click', terminateCall);

        // أزرار التحكم بالواجهات للمعاينة
        document.getElementById('toggleStatusBtn').addEventListener('click', () => {
            isAvailable = !isAvailable;
            if(isAvailable) {
                opStatusBadge.innerText = "الحالة: متاح لاستقبال المكالمات";
                opStatusBadge.className = "badge badge-success";
                document.getElementById('toggleStatusBtn').innerText = "تحويل إلى: مشغول";
            } else {
                opStatusBadge.innerText = "الحالة: مشغول";
                opStatusBadge.className = "badge badge-warning";
                document.getElementById('toggleStatusBtn').innerText = "تحويل إلى: متاح";
            }
        });

        document.getElementById('switchViewBtn').addEventListener('click', () => {
            if (userView.style.display === 'none') {
                userView.style.display = 'block';
                operatorView.style.display = 'none';
            } else {
                userView.style.display = 'none';
                operatorView.style.display = 'block';
            }
        });
    </script>
</body>
</html>
