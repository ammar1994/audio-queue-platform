<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المشغل</title>
</head>
<body>
    <div id="queue"></div>
    <audio id="remoteAudio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ /* أعد بيانات الـ firebase هنا */ }));
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
        });

        pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

        onValue(ref(db, "calls"), (snap) => {
            const data = snap.val();
            const q = document.getElementById('queue');
            q.innerHTML = "";
            for(let id in data) {
                if(data[id].status === "waiting") {
                    let btn = document.createElement('button');
                    btn.innerText = "رد على " + id;
                    btn.onclick = () => answer(id);
                    q.appendChild(btn);
                }
            }
        });

        async function answer(id) {
            window.callId = id;
            pc.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${id}/opIce`), e.candidate.toJSON()); };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            update(ref(db, `calls/${id}`), { status: "active", offer });
            
            onValue(ref(db, `calls/${id}/answer`), async (snap) => {
                if(snap.val() && !pc.remoteDescription) await pc.setRemoteDescription(snap.val());
            });
        }
    </script>
</body>
</html>
