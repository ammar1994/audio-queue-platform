<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اتصال مباشر</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { padding: 20px 40px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <button class="btn" id="start">بدء الاتصال</button>
    <audio id="remoteAudio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ /* أعد بيانات الـ firebase هنا */ }));
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        document.getElementById('start').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            
            const callRef = push(ref(db, "calls"));
            window.callId = callRef.key;
            await set(callRef, { status: "waiting" });

            pc.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${window.callId}/clientIce`), e.candidate.toJSON()); };
            pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

            onValue(ref(db, `calls/${window.callId}`), async (snap) => {
                const data = snap.val();
                if(data?.status === "active" && !pc.remoteDescription) {
                    await pc.setRemoteDescription(data.offer);
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    update(ref(db, `calls/${window.callId}`), { answer: ans });
                }
            });
        };
    </script>
</body>
</html>
