<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المشغل</title>
</head>
<body>
    <div id="queue"></div>
    <audio id="audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ /* ... config ... */ }));
        let pc;

        onValue(ref(db, "calls"), (snap) => {
            const data = snap.val();
            const q = document.getElementById('queue');
            q.innerHTML = "";
            for(let id in data) {
                if(data[id].status === "waiting") {
                    let btn = document.createElement('button');
                    btn.innerText = "رد على " + id;
                    btn.onclick = () => answer(id);
                    q.appendChild(btn);
                }
            }
        });

        async function answer(id) {
            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                ]
            });
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            pc.ontrack = e => document.getElementById('audio').srcObject = e.streams[0];
            pc.onicecandidate = e => { if(e.candidate) push(ref(db, `calls/${id}/opIce`), e.candidate.toJSON()); };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            update(ref(db, `calls/${id}`), { status: "active", offer });
            
            onValue(ref(db, `calls/${id}/answer`), async (snap) => {
                if(snap.val() && !pc.remoteDescription) await pc.setRemoteDescription(snap.val());
            });

            onValue(ref(db, `calls/${id}/clientIce`), snap => {
                snap.forEach(c => pc.addIceCandidate(c.val()));
            });
        }
    </script>
</body>
</html>
