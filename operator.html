<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشغّل - نظام الاتصال الصوتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 30px; }
        .dashboard { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 26px; margin-bottom: 20px; font-weight: 700; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background-color: var(--card-dark); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); border: 1px solid #334155; }
        h2 { font-size: 18px; margin-bottom: 15px; color: var(--text-muted); }
        .queue-list { list-style: none; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background-color: var(--bg-dark); border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .client-info { text-align: right; }
        .client-name { font-weight: 600; font-size: 16px; }
        .client-time { font-size: 12px; color: var(--text-muted); }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #059669; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .active-call-box { display: none; text-align: center; padding: 30px 10px; background-color: rgba(16, 185, 129, 0.1); border: 2px dashed var(--success); border-radius: 8px; }
        .active-name { font-size: 22px; font-weight: 700; color: var(--success); margin-bottom: 15px; }
        .empty-msg { color: var(--text-muted); text-align: center; font-style: italic; padding: 20px 0; }
        .audio-wrapper { margin-top: 15px; background: #0f172a; padding: 10px; border-radius: 8px; display: none; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>لوحة تحكم مشغّل النظام الفني</h1>
        
        <div class="main-grid">
            <div class="card active-call-box" id="activeCallArea">
                <h2>المكالمة الحالية النشطة</h2>
                <div class="active-name" id="currentClientName">جاري التحدث مع: ...</div>
                
                <div class="audio-wrapper" id="audioContainerOp">
                    <p style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">صوت العميل المتصل:</p>
                    <audio id="operatorAudio" autoplay playsinline controls></audio>
                </div>

                <button class="btn btn-danger" id="endCallOpBtn" style="margin-top: 15px;">إنهاء المكالمة الحالية</button>
            </div>

            <div class="card">
                <h2>قائمة المتصلين في الانتظار</h2>
                <ul class="queue-list" id="queueContainer">
                    <li class="empty-msg" id="emptyMessage">لا يوجد عملاء في قائمة الانتظار حالياً...</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, push, set, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAEQyqtcW26k7yc-vKQMpfQgmWXDPP0yw",
            authDomain: "audio-queue-53efb.firebaseapp.com",
            databaseURL: "https://audio-queue-53efb-default-rtdb.firebaseio.com",
            projectId: "audio-queue-53efb",
            storageBucket: "audio-queue-53efb.firebasestorage.app",
            messagingSenderId: "242269512815",
            appId: "1:242269512815:web:df4055e5bd0a154d87599a",
            measurementId: "G-GQ3CRV1YHM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        let opStream = null;
        let opPeer = null;
        let currentActiveCallId = null;

        const queueRef = ref(db, "callsQueue");
        onValue(queueRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('queueContainer');
            
            if (!data) {
                container.innerHTML = '<li class="empty-msg" id="emptyMessage">لا يوجد عملاء في قائمة الانتظار حالياً...</li>';
                return;
            }

            container.innerHTML = "";
            let hasWaiting = false;

            Object.keys(data).forEach(id => {
                const call = data[id];
                if (call.status === "waiting") {
                    hasWaiting = true;
                    const li = document.createElement('li');
                    li.className = 'queue-item';
                    li.innerHTML = `
                        <div class="client-info">
                            <div class="client-name">${call.clientName}</div>
                            <div class="client-time">ينتظر في القائمة...</div>
                        </div>
                        <button class="btn btn-success accept-btn" data-id="${id}" data-name="${call.clientName}">قبول المكالمة</button>
                    `;
                    container.appendChild(li);
                }
            });

            if (!hasWaiting) {
                container.innerHTML = '<li class="empty-msg" id="emptyMessage">لا يوجد عملاء في قائمة الانتظار حالياً...</li>';
            }

            // ربط الحدث لأزرار القبول المضافة حديثاً
            document.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const callId = e.target.getAttribute('data-id');
                    const clientName = e.target.getAttribute('data-name');
                    answerCall(callId, clientName);
                });
            });
        });

        async function answerCall(callId, clientName) {
            try {
                currentActiveCallId = callId;
                document.getElementById('activeCallArea').style.display = 'block';
                document.getElementById('currentClientName').innerText = `جاري التحدث مع: ${clientName}`;

                // 1. تشغيل الميكروفون للمشغّل
                opStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                opPeer = new RTCPeerConnection(rtcConfig);

                // 2. ربط مسارات الصوت
                opStream.getTracks().forEach(track => opPeer.addTrack(track, opStream));

                // 3. استقبال الصوت من العميل
                opPeer.ontrack = (e) => {
                    const audioEl = document.getElementById('operatorAudio');
                    if (e.streams && e.streams[0]) {
                        audioEl.srcObject = e.streams[0];
                    } else {
                        const remoteStream = new MediaStream();
                        remoteStream.addTrack(e.track);
                        audioEl.srcObject = remoteStream;
                    }
                    document.getElementById('audioContainerOp').style.display = 'block';
                    audioEl.play().catch(() => {
                        audioEl.muted = false;
                        audioEl.play();
                    });
                };

                // 4. إرسال ICE Candidates للمشغّل إلى الـ Database
                opPeer.onicecandidate = async (e) => {
                    if (e.candidate && currentActiveCallId) {
                        const candRef = push(ref(db, `callsQueue/${currentActiveCallId}/opCandidates`));
                        await set(candRef, e.candidate.toJSON());
                    }
                };

                // 5. إنشاء الـ Offer ورفعه للـ Firebase ليقرأه العميل
                const offer = await opPeer.createOffer();
                await opPeer.setLocalDescription(offer);
                
                await update(ref(db, `callsQueue/${currentActiveCallId}`), {
                    status: "active",
                    offer: { type: offer.type, sdp: offer.sdp }
                });

                // 6. مراقبة استجابة العميل (Answer) أو إنهاء المكالمة
                onValue(ref(db, `callsQueue/${currentActiveCallId}`), async (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    if (data.answer && !opPeer.currentRemoteDescription) {
                        await opPeer.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }

                    if (data.status === "ended") {
                        resetOperatorUI();
                    }
                });

                // 7. الاستماع الفوري للـ Candidates القادمة من العميل وضخها بالنفق
                const clientCandRef = ref(db, `callsQueue/${currentActiveCallId}/clientCandidates`);
                onValue(clientCandRef, (snapshot) => {
                    if (snapshot.exists() && opPeer && opPeer.currentRemoteDescription) {
                        snapshot.forEach((child) => {
                            try { opPeer.addIceCandidate(new RTCIceCandidate(child.val())); } catch(e){}
                        });
                    }
                });

            } catch (err) {
                alert("يرجى إعطاء صلاحية الميكروفون للمتصفح.");
                resetOperatorUI();
            }
        }

        async function terminateCall() {
            if (currentActiveCallId) {
                await update(ref(db, `callsQueue/${currentActiveCallId}`), { status: "ended" });
                setTimeout(async () => {
                    try { await remove(ref(db, `callsQueue/${currentActiveCallId}`)); } catch(e){}
                }, 400);
            }
            resetOperatorUI();
        }

        function resetOperatorUI() {
            if (currentActiveCallId) {
                off(ref(db, `callsQueue/${currentActiveCallId}`));
                off(ref(db, `callsQueue/${currentActiveCallId}/clientCandidates`));
            }
            if (opPeer) { opPeer.close(); opPeer = null; }
            if (opStream) { opStream.getTracks().forEach(t => t.stop()); opStream = null; }
            currentActiveCallId = null;

            document.getElementById('activeCallArea').style.display = 'none';
            document.getElementById('audioContainerOp').style.display = 'none';
            document.getElementById('currentClientName').innerText = "جاري التحدث مع: ...";
        }

        document.getElementById('endCallOpBtn').addEventListener('click', terminateCall);
    </script>
</body>
</html>
